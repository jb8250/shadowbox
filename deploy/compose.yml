services:
  tor:
    image: dockurr/tor:latest
    container_name: shadowbox-tor-default
    ports:
      - "9050:9050"
      - "3000:3000"
      - "3001:3001"
    environment:
      - TZ=UTC
      - RUN_AS_ROOT=true
    network_mode: bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s --socks5-hostname 127.0.0.1:9050 --connect-timeout 10 https://check.torproject.org/api/ip | grep -q true"]
      interval: 30s
      timeout: 10s
      retries: 5

  chromium:
    image: lscr.io/linuxserver/ungoogled-chromium:latest
    container_name: shadowbox-browser-default
    volumes:
      - shadowbox-default:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - CHROME_CLI=--disable-webrtc --disable-quic --disable-extensions --proxy-server=socks5://127.0.0.1:9050 --host-resolver-rules=MAP * ~NOTFOUND , EXCLUDE 127.0.0.1
    shm_size: "1gb"
    network_mode: service:tor
    depends_on:
      tor:
        condition: service_healthy
    restart: unless-stopped

volumes:
  shadowbox-default: